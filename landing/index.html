    <script>
      // QA-only (?drive=timer): occluded windows freeze rAF + ResizeObserver,
      // which stalls R3F boot. Timer-driven replacements let automated QA run.
      (function () {
        if (new URLSearchParams(location.search).get('drive') !== 'timer') return;
        window.requestAnimationFrame = function (cb) {
          return setTimeout(function () { cb(performance.now()); }, 33);
        };
        window.cancelAnimationFrame = function (id) { clearTimeout(id); };
        window.ResizeObserver = class {
          constructor(cb) { this.cb = cb; this.els = []; }
          observe(el) {
            this.els.push(el);
            const fire = () => {
              const entries = this.els.map((t) => ({ target: t, contentRect: t.getBoundingClientRect() }));
              this.cb(entries, this);
            };
            fire();
            this._i = this._i || setInterval(fire, 500);
          }
          unobserve() {}
          disconnect() { clearInterval(this._i); }
        };
      })();
    </script>
