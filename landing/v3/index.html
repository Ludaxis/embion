    <script>
      // Boot sequence (parse-time): scroll-restoration off + boot lock while the
      // overlay is up, and start the GLB download in parallel with all JS.
      // Heuristic mirrors src/lib/pickModel.ts; keep them in sync.
      (function () {
        try { history.scrollRestoration = 'manual'; } catch (e) {}
        var d = document.documentElement;
        d.classList.add('booting');
        d.classList.add('js'); // gates JS-only initial-hidden states in CSS
        setTimeout(function () { d.classList.remove('booting'); }, 15000);
        var n = navigator;
        var weak =
          matchMedia('(pointer: coarse)').matches ||
          (n.deviceMemory != null && n.deviceMemory <= 4) ||
          (n.hardwareConcurrency != null && n.hardwareConcurrency <= 4);
        var l = document.createElement('link');
        l.rel = 'preload';
        l.as = 'fetch';
        l.crossOrigin = 'anonymous'; // matches three FileLoader: mode cors + same-origin creds
        l.setAttribute('fetchpriority', 'high');
        l.href = weak ? '/models/module-mobile-v5.glb' : '/models/module-v5.glb';
        document.head.appendChild(l);
      })();
    </script>

    <script>
      // Same headless escape hatch as the render rig: ?drive=timer swaps the
      // frame schedulers so the page can render in an occluded window.
      (function () {
        if (new URLSearchParams(location.search).get('drive') !== 'timer') return;
        window.requestAnimationFrame = function (cb) {
          return setTimeout(function () { cb(performance.now()); }, 33);
        };
        window.cancelAnimationFrame = function (id) { clearTimeout(id); };
        window.ResizeObserver = class {
          constructor(cb) { this.cb = cb; this.els = []; }
          observe(el) {
            this.els.push(el);
            const fire = () => {
              const entries = this.els.map((t) => ({ target: t, contentRect: t.getBoundingClientRect() }));
              this.cb(entries, this);
            };
            fire();
            this._i = this._i || setInterval(fire, 500);
          }
          unobserve() {}
          disconnect() { clearInterval(this._i); }
        };
      })();
    </script>
